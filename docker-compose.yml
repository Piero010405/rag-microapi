version: "3.9"

services:
  api:
    build: .
    container_name: rag-report-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine
    container_name: rag-report-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "18080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro